server.port=${PORT:8080}

# MySQL Database configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/signal_guinee?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate configuration (update schema on startup)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuration Email (SMTP) - Adaptable via variables d'environnement
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:b14f25001@smtp-brevo.com}
spring.mail.password=${MAIL_PASSWORD:YOUR_PASSWORD_HERE}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
